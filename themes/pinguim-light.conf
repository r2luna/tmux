# Pinguim Light Theme for Tmux
# Matching Neovim pinnord light colorscheme

# Visual settings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Copy mode - usando cyan para destaque
setw -g mode-style 'fg=#FDF6E3 bg=#2aa198 bold'

# Panes - bordas com hierarquia
set -g pane-border-style 'fg=#D0C9B8'        # Borda inativa (baixa evidência)
set -g pane-active-border-style 'fg=#002b36' # Borda ativa (máxima evidência)

# ----------------------------------------
# STATUS BAR
set -g status-interval 2
set -g status 2
set -g status-position top
set -g status-justify left

# Status bar com background transparente
set -g status-style 'bg=default fg=#657b83'

# Left side - session name com média evidência
set -g status-left '#[fg=#657b83]#S  '
set -g status-left-length 150

set -g status-format[1] " " # spacer line

# Right side - info do sistema
set -g status-right-length 150
set -g status-right '#(~/.config/tmux/scripts/current_dir.sh) #[fg=#657b83] 󰻀  '

# Windows - hierarquia clara entre ativa e inativa
setw -g window-status-current-format ' #I/#W '
setw -g window-status-current-style 'fg=#002b36'  # Janela ativa (máxima evidência)

setw -g window-status-style 'fg=#839496'               # Janelas inativas (baixa evidência)
setw -g window-status-format ' #I/#W '

setw -g window-status-bell-style 'fg=#FDF6E3 bg=#dc322f bold'  # Notificações urgentes

# Messages - máxima evidência
set -g message-style 'fg=#002b36 bg=default bold'
set -g message-command-style 'fg=#002b36 bg=default bold'

# Clock mode
setw -g clock-mode-colour '#002b36'
